apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/monitoring
  prune: true
  # isole des harnesses : un souci Prom/Grafana ne bloque pas 'apps'
  wait: false
  timeout: 8m
