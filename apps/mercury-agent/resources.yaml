apiVersion: v1
kind: Namespace
metadata:
  name: mercury
  labels:
    purpose: agentic-lab
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mercury-data
  namespace: mercury
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mercury-config
  namespace: mercury
data:
  HOME: "/data"                       # ~/.mercury -> /data/.mercury (PVC)
  DEFAULT_PROVIDER: "openaiCompat"    # route via OpenRouter
  OPENAI_COMPAT_ENABLED: "true"
  OPENAI_COMPAT_BASE_URL: "https://openrouter.ai/api/v1"
  OPENAI_COMPAT_MODEL: "deepseek/deepseek-v4-pro"
  MERCURY_NAME: "Mercury"
  MERCURY_OWNER: "iacker"
  MERCURY_PORT: "6174"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mercury
  namespace: mercury
  labels:
    app: mercury
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mercury
  template:
    metadata:
      labels:
        app: mercury
    spec:
      containers:
        - name: mercury
          image: node:20
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "[mercury] install CLI…"
              npm i -g @cosmicstack/mercury-agent --no-audit --no-fund >/tmp/npm.log 2>&1 || { tail -20 /tmp/npm.log; exit 1; }
              mkdir -p "$HOME/.mercury"
              if [ -f "$HOME/.mercury/mercury.yaml" ]; then
                echo "[mercury] config présente -> démarrage daemon + web (:6174)"
                exec mercury start
              else
                echo "[mercury] ⏳ AUCUNE config. Fais le setup UNE fois :"
                echo "    kubectl -n mercury exec -it deploy/mercury -- mercury setup"
                echo "    (active le web dashboard), puis :"
                echo "    kubectl -n mercury rollout restart deploy/mercury"
                exec sleep infinity
              fi
          envFrom:
            - configMapRef: {name: mercury-config}
            - secretRef: {name: mercury-secrets}   # créé hors Git (kubectl)
          ports:
            - containerPort: 6174
              name: web
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {cpu: "1", memory: "768Mi"}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mercury-data
---
apiVersion: v1
kind: Service
metadata:
  name: mercury
  namespace: mercury
spec:
  selector:
    app: mercury
  ports:
    - port: 6174
      targetPort: 6174
      name: web
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mercury-isolation
  namespace: mercury
spec:
  podSelector:
    matchLabels:
      app: mercury
  policyTypes: [Ingress, Egress]
  ingress: []       # deny-all (accès via kubectl port-forward)
  egress:
    - {}            # egress ouvert (OpenRouter + outils)
