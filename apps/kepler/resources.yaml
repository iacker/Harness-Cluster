---
apiVersion: v1
kind: Namespace
metadata:
  name: kepler
  labels:
    purpose: energy-observability
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kepler
  namespace: kepler
spec:
  type: oci
  interval: 24h
  url: oci://quay.io/sustainable_computing_io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kepler
  namespace: kepler
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: kepler
      version: "0.11.4"
      sourceRef:
        kind: HelmRepository
        name: kepler
        namespace: kepler
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    namespace:
      create: false
      name: kepler
    config:
      log:
        level: info          # defaut 'debug' trop verbeux
        format: text
      # mapping des pods/containers K8s — DESACTIVE par defaut, indispensable ici
      kube:
        enabled: true
        podInformer:
          mode: kubelet
      exporter:
        prometheus:
          enabled: true
      experimental:
        gpu:
          enabled: false     # pas de GPU sur les Celeron
    daemonset:
      hostPID: true
      securityContext:
        privileged: true
        runAsNonRoot: false
      # tourner sur TOUS les noeuds (le defaut du chart tolere deja control-plane/master)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      # noeuds Celeron 4Go/2c : bornes basses mais confortables
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
    serviceMonitor:
      enabled: false          # passer a true si Prometheus-Operator installe
