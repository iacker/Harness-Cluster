apiVersion: v1
kind: Namespace
metadata:
  name: hermes
  labels:
    purpose: agentic-lab
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: hermes
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.7.1
          # ENTRYPOINT /init (s6) conservé ; le CMD (args) EST le programme
          # principal (cf. commentaire du service s6 main-hermes). "serve" =
          # backend headless JSON-RPC/WebSocket, reste actif -> container stable.
          # host loopback par défaut (127.0.0.1) -> accès via port-forward.
          # --skip-build : sert le dist pré-buildé de l'image (évite npm build).
          args: ["serve", "--skip-build"]
          env:
            - name: HERMES_HOME
              value: /opt/data
          envFrom:
            - secretRef: {name: hermes-secrets}   # OPENROUTER_API_KEY, hors Git
          ports:
            - containerPort: 9119
              name: gateway
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests: {cpu: "100m", memory: "384Mi"}
            limits: {cpu: "1", memory: "1Gi"}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
---
apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes
spec:
  selector:
    app: hermes
  ports:
    - port: 9119
      targetPort: 9119
      name: gateway
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-isolation
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app: hermes
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - {}            # egress ouvert (OpenRouter, Telegram, outils)
