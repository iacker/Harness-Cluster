apiVersion: v1
kind: Namespace
metadata:
  name: hermes
  labels:
    purpose: agentic-lab
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: hermes
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.7.1
          # On garde l'ENTRYPOINT /init (s6) de l'image et on route un wrapper
          # via CMD (args). main-wrapper.sh: "first arg is an executable -> exec it".
          args:
            - "sh"
            - "-c"
            - |
              if [ -f "$HERMES_HOME/.configured" ]; then
                echo "[hermes] config présente -> démarrage agent"
                exec hermes
              else
                echo "[hermes] AUCUNE config. Setup UNE fois :"
                echo "  kubectl -n hermes exec -it deploy/hermes -- hermes setup"
                echo "  puis: kubectl -n hermes exec deploy/hermes -- touch \$HERMES_HOME/.configured"
                echo "  puis: kubectl -n hermes rollout restart deploy/hermes"
                exec sleep infinity
              fi
          env:
            - name: HERMES_HOME
              value: /opt/data
          envFrom:
            - secretRef: {name: hermes-secrets}   # OPENROUTER_API_KEY, hors Git
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {cpu: "1", memory: "1Gi"}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-isolation
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app: hermes
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - {}            # egress ouvert (OpenRouter, Telegram, outils)
